*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Inter',sans-serif;color:#e0e0e0}
canvas{display:block;width:100%;height:100%}

/* ── SPEECH BUBBLES (HTML overlay) ── */
.bubble{position:absolute;pointer-events:none;transform:translate(-50%,-100%);z-index:50;transition:opacity .4s}
.bubble-inner{background:rgba(255,255,255,.95);color:#1a1a2e;font-size:11px;font-weight:600;padding:6px 12px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;font-family:'Inter',sans-serif;max-width:180px;overflow:hidden;text-overflow:ellipsis;position:relative}
.bubble-inner::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(255,255,255,.95)}
.bubble .emoji{font-size:16px;margin-right:4px}
.bubble.thinking .bubble-inner{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.bubble.thinking .bubble-inner::after{border-top-color:rgba(245,158,11,.15)}
.bubble.talking .bubble-inner{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.bubble.talking .bubble-inner::after{border-top-color:rgba(139,92,246,.15)}
.bubble.coffee .bubble-inner{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.bubble.coffee .bubble-inner::after{border-top-color:rgba(249,115,22,.12)}

/* ── TOP BAR ── */

#topBar .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;font-family:'Outfit',sans-serif;letter-spacing:1.5px}
#topBar .logo span{background:linear-gradient(135deg,#a78bfa,#6d28d9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#topBar .logo .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px #22c55e;animation:pulse 2s infinite}
#topBar .stats{display:flex;gap:20px;font-size:12px;color:#a0a0b0}

/* ── DEPT TABS ── */

.panel-header{padding:16px 18px;background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(99,102,241,.12));border-bottom:1px solid rgba(139,92,246,.2);display:flex;align-items:center;justify-content:space-between}

.close-btn{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.08);border:none;color:#a0a0b0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}

.panel-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.info-row .label{color:#707090;font-weight:500}

.status-badge.busy{background:rgba(245,158,11,.18);color:#fbbf24}

#bubbleLayer{position:fixed;inset:0;pointer-events:none;z-index:80}

// ─── SIGN BUILDER (3D text plaque) ───────────────────────────
function buildSign(text,color,w,h){
  const cv=document.createElement('canvas');cv.width=512;cv.height=128;
  const x=cv.getContext('2d');
  // Background plate
  x.fillStyle='rgba(20,16,35,0.95)';x.beginPath();x.roundRect(8,8,496,112,16);x.fill();
  // Color border
  const cs='#'+color.toString(16).padStart(6,'0');
  x.strokeStyle=cs;x.lineWidth=4;x.beginPath();x.roundRect(8,8,496,112,16);x.stroke();
  // Glow line at bottom
  x.fillStyle=cs;x.fillRect(24,104,464,4);
  // Icon dot
  x.beginPath();x.arc(50,64,12,0,Math.PI*2);x.fillStyle=cs;x.fill();
  // Text
  x.shadowColor=cs;x.shadowBlur=10;
  x.fillStyle='#f0f0f0';x.font='bold 38px Outfit,Inter,Arial';x.textAlign='left';x.textBaseline='middle';
  x.fillText(text,76,62);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false}));
  sp.scale.set(w||3.2,h||.8,1);
  return sp;
}

  P.rKnee=new THREE.Group();P.rKnee.position.y=-.4;
  P.rCalf=B(.14,.35,.14,Mat(0x2a2a40,.6));P.rCalf.position.y=-.17;P.rKnee.add(P.rCalf);
  P.rFoot=B(.16,.08,.24,Mat(0x222235,.4));P.rFoot.position.set(0,-.35,.02);P.rKnee.add(P.rFoot);

  P.lElbow=new THREE.Group();P.lElbow.position.y=-.35;
  P.lFore=B(.12,.3,.13,Mat(a.sk,.55));P.lFore.position.y=-.15;P.lElbow.add(P.lFore);
  P.lHand=S(.06,Mat(a.sk,.55));P.lHand.position.y=-.3;P.lElbow.add(P.lHand);

  g.add(B(.04,.04,.06,Mat(a.sk*.95||a.sk,.55)).translateY(1.72).translateZ(-.38));

  // Cheek blush

    hg.add(new THREE.Mesh(new THREE.SphereGeometry(.4,14,10,0,Math.PI*2,0,Math.PI/2),hm).translateY(1.8));

    P.hair=hg;
  }else{
    P.hair=new THREE.Mesh(new THREE.SphereGeometry(.42,14,10,0,Math.PI*2,0,Math.PI/1.7),hm);

  g.add(P.hair);

  // Name sprite
  const ns=nameSprite(a.nm,dc);ns.position.set(0,2.55,0);ns.scale.set(2.4,.6,1);g.add(ns);

    walk:false,nxt:null,bT:Math.random()*4+2,blink:false,bD:0,

  };
  return g;
}

function nameSprite(t,c){
  const cv=document.createElement('canvas');cv.width=512;cv.height=128;
  const x=cv.getContext('2d');
  x.fillStyle='rgba(12,12,24,0.88)';x.beginPath();x.roundRect(16,16,480,96,22);x.fill();
  const cs='#'+c.toString(16).padStart(6,'0');
  x.strokeStyle=cs;x.lineWidth=3;x.beginPath();x.roundRect(16,16,480,96,22);x.stroke();
  // Glow
  x.shadowColor=cs;x.shadowBlur=12;
  x.fillStyle='#f0f0f0';x.font='bold 36px Outfit,Inter,Arial';x.textAlign='center';x.textBaseline='middle';
  x.fillText(t,256,64);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  return new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false}));
}

// ─── SPEECH BUBBLES (HTML overlay) ──────────────────────────
function createBubble(id){
  const el=document.createElement('div');el.className='bubble';el.id='bub_'+id;
  el.innerHTML='<div class="bubble-inner"><span class="emoji">⌨️</span><span class="txt">Working...</span></div>';
  el.style.opacity='0';
  document.getElementById('bubbleLayer').appendChild(el);
  bubbles[id]=el;
}

function updateBubbles(){
  meshes.forEach((g,id)=>{
    const el=bubbles[id];if(!el)return;
    const ud=g.userData,s=ud.st;
    // Project 3D → 2D
    const v=new THREE.Vector3(0,3.2,0);
    g.localToWorld(v);v.project(cam);
    const hw=window.innerWidth/2,hh=window.innerHeight/2;
    const sx=v.x*hw+hw,sy=-v.y*hh+hh;
    el.style.left=sx+'px';el.style.top=(sy-10)+'px';

    // Show/hide based on state
    const show=s==='typing'||s==='thinking'||s==='talking'||s==='coffee'||s==='presenting';
    el.style.opacity=show&&g.visible?'1':'0';

    const emojis={typing:'⌨️',thinking:'💭',talking:'💬',coffee:'☕',presenting:'📊',whiteboard:'📝',stretching:'🧘',walking:'🚶'};
    const tk=ud.a.tk[Math.floor(T/8)%ud.a.tk.length];
    const texts={typing:tk.t,thinking:'Analyzing...',talking:'Discussing '+tk.t,coffee:'Break time',presenting:tk.t,whiteboard:'Planning',stretching:'Stretching',walking:'Moving'};
    el.className='bubble'+(s==='thinking'?' thinking':s==='talking'?' talking':s==='coffee'?' coffee':'');
    el.querySelector('.emoji').textContent=emojis[s]||'💻';
    el.querySelector('.txt').textContent=texts[s]||'Working';
  });
}

// ─── STATE MACHINE ──────────────────────────────────────────
const ST_DUR={typing:[5,14],thinking:[3,7],walking:[3,5],talking:[5,10],coffee:[5,9],stretching:[2,4],whiteboard:[4,7],presenting:[5,10]};
function pickSt(dp){
  const w={typing:35,thinking:20,walking:12,talking:15,coffee:8,stretching:5,whiteboard:3,presenting:2};
  if(dp==='trad'){w.typing=45;w.thinking=25}
  if(dp==='crea'){w.presenting=15;w.thinking=22}
  if(dp==='lead'){w.talking=25;w.presenting=15}
  if(dp==='know'){w.thinking=32;w.talking=18}
  const tot=Object.values(w).reduce((a,b)=>a+b,0);let r=Math.random()*tot;
  for(const[s,v]of Object.entries(w)){r-=v;if(r<=0)return s}return'typing';
}

function getDest(s,a){
  if(s==='coffee')return new THREE.Vector3((Math.random()-.5)*2,0,-2+Math.random());
  if(s==='whiteboard'||s==='presenting')return new THREE.Vector3((Math.random()-.5)*1.5,0,10+(Math.random()-.5));
  if(s==='walking'){const z=D[a.dp].z;return new THREE.Vector3(z.x+1+Math.random()*(z.w-2),0,z.z+1+Math.random()*(z.h-2))}
  return null;
}

// ─── UPDATE ALL AGENTS ──────────────────────────────────────
function updateAll(dt){
  meshes.forEach((g,id)=>{
    const u=g.userData,a=u.a,P=u.P;

    // BLINK
    u.bT-=dt;
    if(u.bT<=0&&!u.blink){u.blink=true;u.bD=.1}
    if(u.blink){
      u.bD-=dt;const s=u.bD>0?.05:1;
      if(P.lEye){P.lEye.scale.y=s;P.rEye.scale.y=s;P.lPup.scale.y=s;P.rPup.scale.y=s}
      if(u.bD<=0){u.blink=false;u.bT=2+Math.random()*5}
    }

    // BREATHE
    u.br+=dt*1.8;
    if(P.torso)P.torso.scale.set(1+Math.sin(u.br)*.015,1,1+Math.sin(u.br)*.008);

    // STATE TIMER
    u.sT-=dt;
    if(u.sT<=0){
      const ns=pickSt(a.dp);
      u.sT=ST_DUR[ns][0]+Math.random()*(ST_DUR[ns][1]-ST_DUR[ns][0]);
      const dest=getDest(ns,a);
      if(dest){u.tp=dest;u.walk=true;u.nxt=ns;u.st='walking'}
      else{u.st=ns;u.tp=null;u.walk=false}
      if(ns==='talking'){
        let best=null,bd=999;
        meshes.forEach((og,oid)=>{if(oid!==id&&og.userData.a.dp===a.dp){
          const d=g.position.distanceTo(og.position);if(d<bd){bd=d;best=oid}}});
        u.tPart=best;
      }else u.tPart=null;
      if(Math.random()<.4){
        const tk=a.tk[Math.floor(Math.random()*a.tk.length)];
        const acts={typing:`⌨️ ${tk.t}`,thinking:`🤔 ${tk.d.substring(0,35)}...`,walking:'🚶 Relocating',talking:`💬 ${tk.t}`,coffee:'☕ Break',stretching:'🧘 Stretching',whiteboard:`📝 ${tk.t}`,presenting:`📊 ${tk.t}`};
        addLog(a.nm,acts[ns]||tk.t);
      }
    }

    // MOVEMENT
    if(u.tp||u.walk){
      const tp=u.tp||(u.walk?u.desk:null);
      if(tp){
        const dir=new THREE.Vector3().subVectors(tp,g.position);dir.y=0;
        if(dir.length()>.25){
          dir.normalize();g.position.x+=dir.x*3.5*dt;g.position.z+=dir.z*3.5*dt;
          const ta=Math.atan2(dir.x,dir.z);g.rotation.y+=(ta-g.rotation.y)*5*dt;
        }else if(u.walk&&u.nxt){
          u.st=u.nxt;u.walk=false;u.nxt=null;u.tp=null;
        }else if(u.st==='walking'){
          u.tp=u.desk.clone();u.walk=true;u.nxt='typing';
        }
      }
    }

    // Face talk partner
    if(u.st==='talking'&&u.tPart){
      const pg=meshes.get(u.tPart);
      if(pg){const d=new THREE.Vector3().subVectors(pg.position,g.position);
        g.rotation.y+=(Math.atan2(d.x,d.z)-g.rotation.y)*3*dt}
    }

    // ANIMATE BODY
    animBody(g,u,dt);

    // STATUS DOT
    if(P.dot){
      P.dot.scale.setScalar(.7+Math.sin(T*3.5)*.35);
      const cols={typing:0x22c55e,thinking:0xf59e0b,walking:0x3b82f6,talking:0xa855f7,coffee:0xf97316,stretching:0x06b6d4,whiteboard:0xec4899,presenting:0xec4899};
      P.dot.material.color.setHex(cols[u.st]||0x22c55e);
      P.dot.material.emissive.setHex(cols[u.st]||0x22c55e);
    }
  });
}

function animBody(g,u,dt){
  const P=u.P,s=u.st;
  const moving=u.tp&&g.position.distanceTo(u.tp)>.25;

  if(moving||s==='walking'){
    // WALK CYCLE — big visible movements!
    const w=T*9;
    if(P.lLeg){P.lLeg.rotation.x=Math.sin(w)*.6}
    if(P.rLeg){P.rLeg.rotation.x=Math.sin(w+Math.PI)*.6}
    if(P.lKnee){P.lKnee.rotation.x=Math.max(0,Math.sin(w+.6)*.5)}
    if(P.rKnee){P.rKnee.rotation.x=Math.max(0,Math.sin(w+Math.PI+.6)*.5)}
    if(P.lArm){P.lArm.rotation.x=Math.sin(w+Math.PI)*.5;P.lArm.rotation.z=0;if(P.lElbow)P.lElbow.rotation.x=0}
    if(P.rArm){P.rArm.rotation.x=Math.sin(w)*.5;P.rArm.rotation.z=0;if(P.rElbow)P.rElbow.rotation.x=0}
    if(P.head)P.head.rotation.z*=.9;
  }else{
    // Reset legs smoothly
    [P.lLeg,P.rLeg].forEach(l=>{if(l)l.rotation.x*=.85});
    [P.lKnee,P.rKnee].forEach(k=>{if(k)k.rotation.x*=.85});

    switch(s){
      case'typing':
        if(P.lArm){P.lArm.rotation.x=-.7;P.lArm.rotation.z=.2;if(P.lElbow)P.lElbow.rotation.x=-1.3+Math.sin(T*14)*.12}
        if(P.rArm){P.rArm.rotation.x=-.7;P.rArm.rotation.z=-.2;if(P.rElbow)P.rElbow.rotation.x=-1.3+Math.sin(T*14+1.5)*.12}
        if(P.head){P.head.rotation.x=-.06;P.head.rotation.z=Math.sin(T*2)*.02}
        break;
      case'thinking':
        if(P.rArm){P.rArm.rotation.x=-.8;P.rArm.rotation.z=-.15;if(P.rElbow)P.rElbow.rotation.x=-2.3}
        if(P.lArm){P.lArm.rotation.x=-.1;P.lArm.rotation.z=.1;if(P.lElbow)P.lElbow.rotation.x=-.3}
        if(P.head){P.head.rotation.z=Math.sin(T*.7)*.15;P.head.rotation.x=-.1}
        if(P.lBrow)P.lBrow.position.y=1.9+Math.sin(T*1.5)*.02;
        break;
      case'talking':
        const gt=T*3.5;
        if(P.lArm){P.lArm.rotation.x=-.35+Math.sin(gt)*.3;P.lArm.rotation.z=.3+Math.sin(gt*.8)*.15;if(P.lElbow)P.lElbow.rotation.x=-.5+Math.sin(gt+1)*.25}
        if(P.rArm){P.rArm.rotation.x=-.35+Math.sin(gt+2)*.3;P.rArm.rotation.z=-.3+Math.sin(gt*.8+1)*.15;if(P.rElbow)P.rElbow.rotation.x=-.5+Math.sin(gt+3)*.25}
        if(P.mouth)P.mouth.scale.y=1+Math.abs(Math.sin(T*7))*1.2;
        if(P.head){P.head.rotation.z=Math.sin(T*1.8)*.08;P.head.rotation.y=Math.sin(T*2.5)*.1}
        break;
      case'coffee':
        if(P.rArm){P.rArm.rotation.x=-.55;P.rArm.rotation.z=-.08;if(P.rElbow)P.rElbow.rotation.x=-1.9+Math.sin(T*1.2)*.08}
        if(P.lArm){P.lArm.rotation.x=-.05;P.lArm.rotation.z=.05;if(P.lElbow)P.lElbow.rotation.x=-.1}
        if(P.head)P.head.rotation.y=Math.sin(T*.4)*.06;
        break;
      case'stretching':
        if(P.lArm){P.lArm.rotation.x=2.5;P.lArm.rotation.z=.25;if(P.lElbow)P.lElbow.rotation.x=.3}
        if(P.rArm){P.rArm.rotation.x=2.5;P.rArm.rotation.z=-.25;if(P.rElbow)P.rElbow.rotation.x=.3}
        if(P.torso)P.torso.scale.y=1+.04*Math.sin(T*2);
        break;
      case'whiteboard':
        if(P.rArm){P.rArm.rotation.x=-.4+Math.sin(T*5)*.15;P.rArm.rotation.z=-.45;if(P.rElbow)P.rElbow.rotation.x=-.7+Math.sin(T*7)*.1}
        if(P.lArm){P.lArm.rotation.x=-.15;P.lArm.rotation.z=.1;if(P.lElbow)P.lElbow.rotation.x=-.2}
        break;
      case'presenting':
        if(P.rArm){P.rArm.rotation.x=-.5;P.rArm.rotation.z=-.55+Math.sin(T*2)*.12;if(P.rElbow)P.rElbow.rotation.x=-.15}
        if(P.lArm){P.lArm.rotation.x=-.15+Math.sin(T*3)*.2;P.lArm.rotation.z=.2;if(P.lElbow)P.lElbow.rotation.x=-.4+Math.sin(T*3.5)*.15}
        if(P.head)P.head.rotation.y=Math.sin(T*1.5)*.12;
        break;
      default:
        if(P.lArm){P.lArm.rotation.x*=.9;P.lArm.rotation.z*=.9;if(P.lElbow)P.lElbow.rotation.x*=.9}
        if(P.rArm){P.rArm.rotation.x*=.9;P.rArm.rotation.z*=.9;if(P.rElbow)P.rElbow.rotation.x*=.9}
    }
    if(s!=='talking'&&P.mouth)P.mouth.scale.y+=(1-P.mouth.scale.y)*.15;
  }
}

// ─── EVENTS ─────────────────────────────────────────────────
function events(){
  ren.domElement.addEventListener('click',e=>{
    mpos.x=(e.clientX/window.innerWidth)*2-1;mpos.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mpos,cam);
    const ms=[];meshes.forEach(g=>g.children.forEach(c=>{if(c.userData.aid)ms.push(c)}));
    const h=ray.intersectObjects(ms);
    if(h.length>0)showPanel(h[0].object.userData.aid);else closePanel();
  });
  ren.domElement.addEventListener('mousemove',e=>{
    mpos.x=(e.clientX/window.innerWidth)*2-1;mpos.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mpos,cam);
    const ms=[];meshes.forEach(g=>g.children.forEach(c=>{if(c.userData.aid)ms.push(c)}));
    ren.domElement.style.cursor=ray.intersectObjects(ms).length>0?'pointer':'default';
  });
  document.querySelectorAll('.dept-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.dept-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    const dp=t.dataset.d;
    meshes.forEach(g=>{g.visible=dp==='all'||g.userData.a.dp===dp});
    if(dp!=='all'&&D[dp]){const z=D[dp].z;ctrl.target.lerp(new THREE.Vector3(z.x+z.w/2,0,z.z+z.h/2),.5)}
  }));
}

function showPanel(id){
  const a=AG.find(x=>x.id===id);if(!a)return;sel=id;
  const g=meshes.get(id),s=g.userData.st;
  document.getElementById('pName').innerHTML=`${D[a.dp].i} ${a.nm}`;
  const sm={typing:'active',thinking:'busy',walking:'active',talking:'active',coffee:'idle',stretching:'idle',whiteboard:'busy',presenting:'busy'};
  const sl={typing:'⌨️ Typing',thinking:'🤔 Thinking',walking:'🚶 Moving',talking:'💬 Talking',coffee:'☕ Break',stretching:'🧘 Stretch',whiteboard:'📝 Board',presenting:'📊 Presenting'};
  let h=`<div class="info-row"><span class="label">Role</span><span class="value">${a.rl}</span></div>
    <div class="info-row"><span class="label">Dept</span><span class="value">${D[a.dp].i} ${D[a.dp].n}</span></div>
    <div class="info-row"><span class="label">Project</span><span class="value">${a.pj}</span></div>
    <div class="info-row"><span class="label">Status</span><span class="status-badge ${sm[s]||'active'}">${sl[s]||s}</span></div>
    <hr style="border:none;border-top:1px solid rgba(139,92,246,.15);margin:6px 0">
    <div style="font-size:11px;color:#707090;font-weight:700;letter-spacing:.5px;margin-bottom:4px">ACTIVE TASKS</div>`;
  a.tk.forEach(t=>{h+=`<div class="task-card"><div class="task-title">${t.t}</div><div class="task-desc">${t.d}</div><div class="progress-bar"><div class="fill" style="width:${t.p}%;background:${D[a.dp].h}"></div></div><div style="text-align:right;font-size:9px;color:#707090;margin-top:3px">${Math.round(t.p)}%</div></div>`});
  document.getElementById('pBody').innerHTML=h;
  document.getElementById('agentPanel').classList.add('visible');
  ctrl.target.lerp(new THREE.Vector3(g.position.x,1.5,g.position.z),.3);
}
function closePanel(){document.getElementById('agentPanel').classList.remove('visible');sel=null}

// ─── LOG ────────────────────────────────────────────────────
const logs=[];
function addLog(n,a){
  const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logs.unshift({t,n,a});if(logs.length>25)logs.pop();
  document.getElementById('logBody').innerHTML=logs.map(e=>`<div class="log-entry"><span class="time">${e.t}</span><span class="aname">${e.n}</span><span class="act">${e.a}</span></div>`).join('');
}

// ─── UI ─────────────────────────────────────────────────────
function ui(){
  document.getElementById('sA').textContent=AG.length;
  document.getElementById('sP').textContent=new Set(AG.map(a=>a.pj)).size;
  const cnt={};AG.forEach(a=>cnt[a.dp]=(cnt[a.dp]||0)+1);
  document.getElementById('cA').textContent=AG.length;
  const ids={dev:'cDev',crea:'cCrea',auto:'cAuto',infra:'cInfra',brain:'cBrain'};
  Object.keys(D).forEach(d=>{const el=document.getElementById(ids[d]);if(el)el.textContent=cnt[d]||0});
  const lg=document.getElementById('legend');
  Object.entries(D).forEach(([k,d])=>{
    const it=document.createElement('div');it.className='leg-item';
    it.innerHTML=`<div class="leg-dot" style="background:${d.h}"></div>${d.i} ${d.n}`;
    it.onclick=()=>{
      document.querySelectorAll('.dept-tab').forEach(t=>t.classList.toggle('active',t.dataset.d===k));
      meshes.forEach(g=>{g.visible=g.userData.a.dp===k});
      const z=d.z;ctrl.target.lerp(new THREE.Vector3(z.x+z.w/2,0,z.z+z.h/2),.5);
    };lg.appendChild(it)});
  setInterval(()=>{
    document.getElementById('sT').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    let ac=0;meshes.forEach(g=>{if(!['coffee','stretching'].includes(g.userData.st))ac++});
    document.getElementById('sAc').textContent=ac;
  },1000);
  setInterval(()=>{AG.forEach(a=>a.tk.forEach(t=>{t.p=Math.min(100,Math.max(5,t.p+(Math.random()-.3)*3))}));if(sel)showPanel(sel)},5000);
}

function hideLoad(){
  const f=document.getElementById('loadFill');let p=0;
  const iv=setInterval(()=>{p+=Math.random()*18+5;if(p>=100){p=100;clearInterval(iv);
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),300)}f.style.width=p+'%'},100);
}

window.addEventListener('resize',()=>{
  const a=window.innerWidth/window.innerHeight,d=26;
  cam.left=-d*a;cam.right=d*a;cam.top=d;cam.bottom=-d;
  cam.updateProjectionMatrix();ren.setSize(window.innerWidth,window.innerHeight);
});

// ─── MAIN LOOP ──────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clk.getDelta(),.05);T+=dt;
  ctrl.update();updateAll(dt);updateBubbles();
  // Particles
  parts.forEach(p=>{p.position.y+=p.userData.sp*dt;p.position.x+=Math.sin(T*.8+p.userData.dr)*.004;
    if(p.position.y>5){p.position.y=.3;p.position.x=(Math.random()-.5)*36;p.position.z=(Math.random()-.5)*28+6}
    p.material.opacity=.08+Math.sin(T*1.5+p.userData.dr)*.06});
  // Leaf sway
  scene.traverse(o=>{if(o.userData.leaf)o.position.x+=Math.sin(T*1.2+o.position.z)*.0003});
  ren.render(scene,cam);
}
