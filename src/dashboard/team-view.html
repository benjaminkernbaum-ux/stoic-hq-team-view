.bubble-inner::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(255,255,255,.95)}
.bubble .emoji{font-size:16px;margin-right:4px}
.bubble.thinking .bubble-inner{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.bubble.thinking .bubble-inner::after{border-top-color:rgba(245,158,11,.15)}
.bubble.talking .bubble-inner{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.bubble.talking .bubble-inner::after{border-top-color:rgba(139,92,246,.15)}
.bubble.coffee .bubble-inner{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.3)}

function worldToGrid(x, z) {
  const col = Math.max(0, Math.min(COLS - 1, Math.floor((x - GRID_MIN_X) / GRID_SIZE)));
  const row = Math.max(0, Math.min(ROWS - 1, Math.floor((z - GRID_MIN_Z) / GRID_SIZE)));
  return { col, row };
}

function gridToWorld(col, row) {
  const x = GRID_MIN_X + col * GRID_SIZE + GRID_SIZE / 2;
  const z = GRID_MIN_Z + row * GRID_SIZE + GRID_SIZE / 2;
  return new THREE.Vector3(x, 0, z);
}

  if (z >= 12.7 && z <= 13.3 && ((x >= -22 && x <= -3) || (x >= 1 && x <= 26))) return true;
  // Vertical wall at x=-0.5
  if (x >= -0.7 && x <= -0.3 && ((z >= -12 && z <= 0) || (z >= 3 && z <= 12) || (z >= 14 && z <= 28))) return true;

  // Server rack cluster at x=18, z=10.5
  if (x >= 15.5 && x <= 20.5 && z >= 9.5 && z <= 11.5) return true;
  // Lounge Area Sofa at x=-11, z=25
  if (x >= -13.5 && x <= -7.5 && z >= 22.0 && z <= 26.5) return true;
  // Kitchen counter at x=22, z=-6
  if (x >= 19.0 && x <= 24.5 && z >= -7.0 && z <= -5.0) return true;
  // Meeting Table at x=0, z=7
  if (x >= -1.8 && x <= 1.8 && z >= 6.0 && z <= 8.0) return true;

  // Block active desks themselves ( px, pz ) but keep the seat spot at ( px, pz+0.55 ) walkable!
  for (let i = 0; i < AG.length; i++) {

    if (x >= a.px - 1.1 && x <= a.px + 1.1 && z >= a.pz - 0.7 && z <= a.pz + 0.1) {

    }

  return false;
}

function initGrid() {
  for (let col = 0; col < COLS; col++) {
    grid[col] = [];
    for (let row = 0; row < ROWS; row++) {
      const worldPos = gridToWorld(col, row);
      grid[col][row] = isObstacle(worldPos.x, worldPos.z) ? 0 : 1;
    }
  }
}

// ─── A* PATHFINDING ALGORITHM ───
function findPath(startPos, endPos) {
  const startGrid = worldToGrid(startPos.x, startPos.z);
  const endGrid = worldToGrid(endPos.x, endPos.z);
  
  if (startGrid.col === endGrid.col && startGrid.row === endGrid.row) {
    return [];
  }

  const openSet = [];
  const closedSet = new Set();

  const startNode = {
    col: startGrid.col,
    row: startGrid.row,
    g: 0,
    h: Math.abs(startGrid.col - endGrid.col) + Math.abs(startGrid.row - endGrid.row),
    f: 0,
    parent: null
  };
  startNode.f = startNode.g + startNode.h;
  openSet.push(startNode);

  while (openSet.length > 0) {
    openSet.sort((a, b) => a.f - b.f);
    const current = openSet.shift();

    if (current.col === endGrid.col && current.row === endGrid.row) {
      const path = [];
      let curr = current;
      while (curr !== null) {
        path.push(gridToWorld(curr.col, curr.row));
        curr = curr.parent;
      }
      path.reverse();
      return path;
    }

    const key = `${current.col}_${current.row}`;
    closedSet.add(key);

    const neighbors = [
      { col: current.col + 1, row: current.row },
      { col: current.col - 1, row: current.row },
      { col: current.col, row: current.row + 1 },
      { col: current.col, row: current.row - 1 }
    ];

    for (const n of neighbors) {
      if (n.col < 0 || n.col >= COLS || n.row < 0 || n.row >= ROWS) continue;
      if (grid[n.col][n.row] === 0) continue; // Obstacle

      const neighborKey = `${n.col}_${n.row}`;
      if (closedSet.has(neighborKey)) continue;

      const gScore = current.g + 1;
      let existing = openSet.find(o => o.col === n.col && o.row === n.row);

      if (!existing) {
        const hScore = Math.abs(n.col - endGrid.col) + Math.abs(n.row - endGrid.row);
        const neighborNode = {
          col: n.col,
          row: n.row,
          g: gScore,
          h: hScore,
          f: gScore + hScore,
          parent: current
        };
        openSet.push(neighborNode);
      } else if (gScore < existing.g) {
        existing.g = gScore;
        existing.f = gScore + existing.h;
        existing.parent = current;
      }
    }
  }
  return [endPos]; // fallback to straight vector if path blocks
}

// ─── WEB AUDIO API SYNTHESIZER ───
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playServerHum() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, audioCtx.currentTime); // low pitch power fan hum
  
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(110, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  humNode = osc;
}

function playTypeSound() {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1400 + Math.random() * 600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.02);
  
  gain.gain.setValueAtTime(0.006 + Math.random() * 0.005, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.025);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.03);
}

function playCoffeeSound() {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  // steam hiss
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(440 + Math.random()*80, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.4);
  
  gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.45);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

function playStandupChime() {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  const notes = [261.63, 329.63, 392.00, 523.25]; // C Major arpeggio
  notes.forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.12);
    
    gain.gain.setValueAtTime(0, audioCtx.currentTime + idx * 0.12);
    gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + idx * 0.12 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + idx * 0.12 + 0.5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(audioCtx.currentTime + idx * 0.12);
    osc.stop(audioCtx.currentTime + idx * 0.12 + 0.6);
  });
}

function toggleAudioContext() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  audioEnabled = !audioEnabled;
  const icon = document.getElementById('audioIcon');
  const text = document.getElementById('audioText');
  const btn = document.getElementById('audioToggle');
  
  if (audioEnabled) {
    icon.textContent = '🔊';
    text.textContent = 'SOUNDS: ON';
    btn.style.background = 'rgba(34,197,94,0.2)';
    btn.style.borderColor = 'rgba(34,197,94,0.4)';
    playServerHum();
  } else {
    icon.textContent = '🔈';
    text.textContent = 'SOUNDS: OFF';
    btn.style.background = 'rgba(139,92,246,0.15)';
    btn.style.borderColor = 'rgba(139,92,246,0.3)';
    if (humNode) {
      try { humNode.stop(); } catch(e) {}
      humNode = null;
    }
  }
}

function createHologramScreen(dc) {

  ctx.fillStyle = 'rgba(10, 10, 26, 0.85)';

  ctx.shadowBlur = 8;

  ];
  
  ctx.font = '9px monospace';

  lines.forEach((l, idx) => {

function nameSprite(t,c){
  const cv=document.createElement('canvas');cv.width=512;cv.height=128;
  const x=cv.getContext('2d');
  x.fillStyle='rgba(12,12,24,0.88)';x.beginPath();x.roundRect(16,16,480,96,22);x.fill();
  const cs='#'+c.toString(16).padStart(6,'0');
  x.strokeStyle=cs;x.lineWidth=3;x.beginPath();x.roundRect(16,16,480,96,22);x.stroke();
  x.shadowColor=cs;x.shadowBlur=12;
  x.fillStyle='#f0f0f0';x.font='bold 36px Outfit,Inter,Arial';x.textAlign='center';x.textBaseline='middle';
  x.fillText(t,256,64);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  return new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false}));
}

function createBubble(id){

}

function updateBubbles(){
  meshes.forEach((g,id)=>{
    const el=bubbles[id];if(!el)return;
    const ud=g.userData,s=ud.st;
    const v=new THREE.Vector3(0,3.2,0);
    g.localToWorld(v);v.project(cam);
    const hw=window.innerWidth/2,hh=window.innerHeight/2;
    const sx=v.x*hw+hw,sy=-v.y*hh+hh;
    el.style.left=sx+'px';el.style.top=(sy-10)+'px';

    const show=s==='typing'||s==='thinking'||s==='talking'||s==='coffee'||s==='presenting';
    el.style.opacity=show&&g.visible?'1':'0';

    const emojis={typing:'⌨️',thinking:'💭',talking:'💬',coffee:'☕',presenting:'📊',whiteboard:'📝',stretching:'🧘',walking:'🚶'};
    const tk=ud.a.tk[Math.floor(T/8)%ud.a.tk.length];
    const texts={typing:tk.t,thinking:'Analyzing...',talking:'Discussing '+tk.t,coffee:'Break time',presenting:tk.t,whiteboard:'Planning',stretching:'Stretching',walking:'Moving'};
    el.className='bubble'+(s==='thinking'?' thinking':s==='talking'?' talking':s==='coffee'?' coffee':'');
    el.querySelector('.emoji').textContent=emojis[s]||'💻';
    el.querySelector('.txt').textContent=texts[s]||'Working';
  });
}

  if(dp==='trad'){w.typing=45;w.thinking=25}
  if(dp==='crea'){w.presenting=15;w.thinking=22}
  if(dp==='lead'){w.talking=25;w.presenting=15}
  if(dp==='know'){w.thinking=32;w.talking=18}
  const tot=Object.values(w).reduce((a,b)=>a+b,0);let r=Math.random()*tot;
  for(const[s,v]of Object.entries(w)){r-=v;if(r<=0)return s}return'typing';
}

function getDest(s,a){
  if(s==='coffee')return new THREE.Vector3(20 + Math.random()*3, 0, -6 + Math.random()*1); // Kitchen table/cooler spot
  if(s==='whiteboard'||s==='presenting')return new THREE.Vector3((Math.random()-.5)*1.2,0,5.8); // Whiteboard spot in Meeting room
  if(s==='walking'){
    const z=D[a.dp].z;
    // Find walkable spot
    for(let i=0;i<20;i++){
      const rx = z.x+1+Math.random()*(z.w-2);
      const rz = z.z+1+Math.random()*(z.h-2);
      const gC = worldToGrid(rx, rz);
      if(grid[gC.col] && grid[gC.col][gC.row] === 1) {
        return new THREE.Vector3(rx, 0, rz);
      }
    }
    return new THREE.Vector3(z.x+z.w/2,0,z.z+z.h/2);
  }
  return null;
}

// ─── DAILY MEETING SYSTEM (Scrum Standup) ───
function initStandupSpots() {
  standupManager.spots = [];
  const radiusX = 3.6;
  const radiusZ = 2.4;
  for (let i = 0; i < AG.length; i++) {
    const angle = (i / AG.length) * Math.PI * 2;
    const x = Math.cos(angle) * radiusX;
    const z = 7 + Math.sin(angle) * radiusZ;
    standupManager.spots.push(new THREE.Vector3(x, 0, z));
  }
}

function triggerStandup() {
  standupManager.active = true;
  standupManager.phase = 'assembling';
  standupManager.meetingTimer = 15.0; // Wait at most 15s to assemble

  addLog('STANDUP SYSTEM', '🔔 Scrum Standup has started! Team assembling at Meeting Table...');
  playStandupChime();

  const leads = ['cto', 'orch', 'front', 'thia', 'tbot', 'supa', 'obsi'];
  standupManager.speakers = leads.filter(id => meshes.has(id)).slice(0, 6);

  initStandupSpots();
  let idx = 0;
  meshes.forEach(g => {
    const u = g.userData;
    u.tp = standupManager.spots[idx++];
    u.walk = true;
    u.nxt = 'presenting';
    u.st = 'walking';
    u.path = findPath(g.position, u.tp);
  });
}

function updateStandup(dt) {
  if (standupManager.phase === 'assembling') {
    standupManager.meetingTimer -= dt;
    let allArrived = true;
    meshes.forEach(g => {
      if (g.userData.st === 'walking') allArrived = false;
    });

    if (allArrived || standupManager.meetingTimer <= 0) {
      standupManager.phase = 'meeting';
      standupManager.speakerIndex = 0;
      standupManager.speakerTimer = 2.5; // 2.5 seconds per active speaker
      addLog('STANDUP SYSTEM', '🎤 Daily Scrum meeting in progress...');
    }
  } else if (standupManager.phase === 'meeting') {
    standupManager.speakerTimer -= dt;
    const speakerId = standupManager.speakers[standupManager.speakerIndex];
    const g = meshes.get(speakerId);
    
    if (g) {
      const u = g.userData;
      u.st = 'talking';
      
      if (standupSpotlight) {
        standupSpotlight.position.set(g.position.x, 3.5, g.position.z);
        standupSpotlight.intensity = 2.5;
        standupSpotlight.color.setHex(D[u.a.dp].c);
      }

      const el = bubbles[speakerId];
      if (el) {
        const tk = u.a.tk[0];
        el.className = 'bubble talking';
        el.querySelector('.emoji').textContent = '🎤';
        el.querySelector('.txt').textContent = `[x] Done: ${tk.t}`;

        if (standupManager.speakerTimer > 2.3) {
          addLog(u.a.nm, `📢 Daily: [x] Done: ${tk.t} | [/] Progress: ${tk.d.substring(0, 20)}...`);
        }
      }
    }

    if (standupManager.speakerTimer <= 0) {
      if (g) g.userData.st = 'presenting';
      
      standupManager.speakerIndex++;
      if (standupManager.speakerIndex >= standupManager.speakers.length) {
        adjournStandup();
      } else {
        standupManager.speakerTimer = 2.5;
      }
    }
  }
}

function adjournStandup() {
  standupManager.phase = 'dispersing';
  standupManager.active = false;
  standupManager.timer = 120; // reset cooldown to 2 minutes

  if (standupSpotlight) standupSpotlight.intensity = 0;

  addLog('STANDUP SYSTEM', '✅ Meeting complete. Team dispersing back to their desks.');
  playStandupChime();

  meshes.forEach(g => {
    const u = g.userData;
    u.tp = u.desk.clone(); // Pathfind back to desk chair
    u.walk = true;
    u.nxt = 'typing';
    u.st = 'walking';
    u.path = findPath(g.position, u.tp);
  });
}

// ─── UPDATE ALL AGENTS ───
function updateAll(dt){
  meshes.forEach((g,id)=>{
    const u=g.userData,a=u.a,P=u.P,s=u.st;

    // BLINK
    u.bT-=dt;
    if(u.bT<=0&&!u.blink){u.blink=true;u.bD=.1}
    if(u.blink){
      u.bD-=dt;const sc=u.bD>0?.05:1;
      if(P.lEye){P.lEye.scale.y=sc;P.rEye.scale.y=sc;}
      if(u.bD<=0){u.blink=false;u.bT=2+Math.random()*5}
    }

    // BREATHE
    u.br+=dt*1.8;
    if(P.torso)P.torso.scale.set(1+Math.sin(u.br)*.015,1,1+Math.sin(u.br)*.008);

    // STATE TIMER (Only update normal cycles if Standup Scrum is NOT active)
    if (!standupManager.active) {
      u.sT-=dt;
      if(u.sT<=0){
        const ns=pickSt(a.dp);
        u.sT=ST_DUR[ns][0]+Math.random()*(ST_DUR[ns][1]-ST_DUR[ns][0]);
        const dest=getDest(ns,a);
        
        // Dynamic desk-return logic: if state occurs at desk, but agent is away, make them walk back first!
        const isDeskState = ['typing', 'thinking', 'stretching'].includes(ns);
        const isAway = g.position.distanceTo(u.desk) > 0.8;
        
        if (dest) {
          u.tp=dest;u.walk=true;u.nxt=ns;u.st='walking';
          u.path=findPath(g.position, u.tp);
        } else if (isDeskState && isAway) {
          u.tp=u.desk.clone();u.walk=true;u.nxt=ns;u.st='walking';
          u.path=findPath(g.position, u.tp);
        } else {
          u.st=ns;u.tp=null;u.walk=false;u.path=[];
        }

        if(ns==='talking'){
          let best=null,bd=999;
          meshes.forEach((og,oid)=>{if(oid!==id&&og.userData.a.dp===a.dp){
            const d=g.position.distanceTo(og.position);if(d<bd){bd=d;best=oid}}});
          u.tPart=best;
        }else u.tPart=null;

        if(Math.random()<.3){
          const tk=a.tk[Math.floor(Math.random()*a.tk.length)];
          const acts={typing:`⌨️ ${tk.t}`,thinking:`💭 analyzing tasks`,walking:'🚶 Relocating',talking:`💬 Syncing`,coffee:'☕ Coffee break',stretching:'🧘 stretching',whiteboard:`📝 Planning`,presenting:`📊 Review`};
          addLog(a.nm,acts[ns]||tk.t);
          if (ns === 'coffee') playCoffeeSound();
        }
      }
    }

    // MOVEMENT MECHANICS (A* pathfinding with waypoint navigation!)
    if(u.tp || u.walk) {
      const tp = u.tp || (u.walk ? u.desk : null);
      if (tp) {
        // If path is empty, generate path using A*
        if (!u.path || u.path.length === 0) {
          u.path = findPath(g.position, tp);
        }

        if (u.path && u.path.length > 0) {
          const wp = u.path[0];
          const dir = new THREE.Vector3().subVectors(wp, g.position);
          dir.y = 0;
          
          if (dir.length() > 0.15) {
            dir.normalize();
            g.position.x += dir.x * 4.2 * dt;
            g.position.z += dir.z * 4.2 * dt;
            const ta = Math.atan2(dir.x, dir.z);
            
            // smooth rotation wrapping
            let diff = ta - g.rotation.y;
            while(diff < -Math.PI) diff += Math.PI * 2;
            while(diff > Math.PI) diff -= Math.PI * 2;
            g.rotation.y += diff * 8 * dt;
          } else {
            u.path.shift(); // waypoint reached, move to next
          }
        } else {
          // Finished A* path!
          if (u.walk && u.nxt) {
            u.st = u.nxt; u.walk = false; u.nxt = null; u.tp = null;
          } else if (u.st === 'walking') {
            u.tp = u.desk.clone(); u.walk = true; u.nxt = 'typing';
            u.path = findPath(g.position, u.tp);
          }
        }
      }
    }

    if(u.st==='talking'&&u.tPart){
      const pg=meshes.get(u.tPart);
      if(pg){const d=new THREE.Vector3().subVectors(pg.position,g.position);
        g.rotation.y+=(Math.atan2(d.x,d.z)-g.rotation.y)*3*dt}
    }

    animBody(g,u,dt);

    // STATUS SPOTLIGHT & DOTS
    if(P.dot){
      P.dot.scale.setScalar(.7+Math.sin(T*3.5)*.35);
      const cols={typing:0x22c55e,thinking:0xf59e0b,walking:0x3b82f6,talking:0xa855f7,coffee:0xf97316,stretching:0x06b6d4,whiteboard:0xec4899,presenting:0xec4899};
      P.dot.material.color.setHex(cols[u.st]||0x22c55e);
      P.dot.material.emissive.setHex(cols[u.st]||0x22c55e);
    }

    // Dynamic HUD hologram rendering sways
    if (P.hologram) {
      P.hologram.visible = (s === 'typing' || s === 'thinking') && g.visible && !standupManager.active;
      if (P.hologram.visible) {
        P.hologram.position.y = 2.05 + Math.sin(T * 2.5 + u.br) * 0.035;
      }
    }
  });
}

function animBody(g,u,dt){
  const P=u.P,s=u.st;
  const moving=(u.path && u.path.length > 0) || s === 'walking';

  if(moving){
    // WALK CYCLE
    const w=T*9;
    if(P.lLeg){P.lLeg.rotation.x=Math.sin(w)*.6}
    if(P.rLeg){P.rLeg.rotation.x=Math.sin(w+Math.PI)*.6}
    if(P.lKnee){P.lKnee.rotation.x=Math.max(0,Math.sin(w+.6)*.5)}
    if(P.rKnee){P.rKnee.rotation.x=Math.max(0,Math.sin(w+Math.PI+.6)*.5)}
    if(P.lArm){P.lArm.rotation.x=Math.sin(w+Math.PI)*.5;P.lArm.rotation.z=0;}
    if(P.rArm){P.rArm.rotation.x=Math.sin(w)*.5;P.rArm.rotation.z=0;}
    if(P.head)P.head.rotation.z*=.9;
  }else{
    if(P.lLeg)P.lLeg.rotation.x*=.85;if(P.rLeg)P.rLeg.rotation.x*=.85;
    if(P.lKnee)P.lKnee.rotation.x*=.85;if(P.rKnee)P.rKnee.rotation.x*=.85;

    switch(s){
      case'typing':
        if(P.lArm){P.lArm.rotation.x=-.7;P.lArm.rotation.z=.2;if(P.lElbow)P.lElbow.rotation.x=-1.3+Math.sin(T*14)*.12}
        if(P.rArm){P.rArm.rotation.x=-.7;P.rArm.rotation.z=-.2;if(P.rElbow)P.rElbow.rotation.x=-1.3+Math.sin(T*14+1.5)*.12}
        if(P.head){P.head.rotation.x=-.06;P.head.rotation.z=Math.sin(T*2)*.02}
        break;
      case'thinking':
        if(P.rArm){P.rArm.rotation.x=-.8;P.rArm.rotation.z=-.15;if(P.rElbow)P.rElbow.rotation.x=-2.3}
        if(P.lArm){P.lArm.rotation.x=-.1;P.lArm.rotation.z=.1;if(P.lElbow)P.lElbow.rotation.x=-.3}
        if(P.head){P.head.rotation.z=Math.sin(T*.7)*.15;P.head.rotation.x=-.1}
        break;
      case'talking':
        const gt=T*3.5;
        if(P.lArm){P.lArm.rotation.x=-.35+Math.sin(gt)*.3;P.lArm.rotation.z=.3+Math.sin(gt*.8)*.15;if(P.lElbow)P.lElbow.rotation.x=-.5+Math.sin(gt+1)*.25}
        if(P.rArm){P.rArm.rotation.x=-.35+Math.sin(gt+2)*.3;P.rArm.rotation.z=-.3+Math.sin(gt*.8+1)*.15;if(P.rElbow)P.rElbow.rotation.x=-.5+Math.sin(gt+3)*.25}
        if(P.mouth)P.mouth.scale.y=1+Math.abs(Math.sin(T*7))*1.2;
        if(P.head){P.head.rotation.z=Math.sin(T*1.8)*.08;P.head.rotation.y=Math.sin(T*2.5)*.1}
        break;
      case'coffee':
        if(P.rArm){P.rArm.rotation.x=-.55;P.rArm.rotation.z=-.08;if(P.rElbow)P.rElbow.rotation.x=-1.9+Math.sin(T*1.2)*.08}
        if(P.lArm){P.lArm.rotation.x=-.05;P.lArm.rotation.z=.05;if(P.lElbow)P.lElbow.rotation.x=-.1}
        if(P.head)P.head.rotation.y=Math.sin(T*.4)*.06;
        break;
      case'stretching':
        if(P.lArm){P.lArm.rotation.x=2.5;P.lArm.rotation.z=.25;if(P.lElbow)P.lElbow.rotation.x=.3}
        if(P.rArm){P.rArm.rotation.x=2.5;P.rArm.rotation.z=-.25;if(P.rElbow)P.rElbow.rotation.x=.3}
        if(P.torso)P.torso.scale.y=1+.04*Math.sin(T*2);
        break;
      case'whiteboard':
        if(P.rArm){P.rArm.rotation.x=-.4+Math.sin(T*5)*.15;P.rArm.rotation.z=-.45;if(P.rElbow)P.rElbow.rotation.x=-.7+Math.sin(T*7)*.1}
        if(P.lArm){P.lArm.rotation.x=-.15;P.lArm.rotation.z=.1;if(P.lElbow)P.lElbow.rotation.x=-.2}
        break;
      case'presenting':
        if(P.rArm){P.rArm.rotation.x=-.5;P.rArm.rotation.z=-.55+Math.sin(T*2)*.12;if(P.rElbow)P.rElbow.rotation.x=-.15}
        if(P.lArm){P.lArm.rotation.x=-.15+Math.sin(T*3)*.2;P.lArm.rotation.z=.2;if(P.lElbow)P.lElbow.rotation.x=-.4+Math.sin(T*3.5)*.15}
        if(P.head)P.head.rotation.y=Math.sin(T*1.5)*.12;
        break;
      default:
        if(P.lArm)P.lArm.rotation.set(0,0,0);if(P.rArm)P.rArm.rotation.set(0,0,0);
    }
    if(s!=='talking'&&P.mouth)P.mouth.scale.y+=(1-P.mouth.scale.y)*.15;
  }
}

// ─── INTERACTION LOGIC & EVENTS ───
function events(){
  ren.domElement.addEventListener('click',e=>{
    mpos.x=(e.clientX/window.innerWidth)*2-1;mpos.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mpos,cam);
    const ms=[];meshes.forEach(g=>g.children.forEach(c=>{if(c.userData.aid)ms.push(c)}));
    const h=ray.intersectObjects(ms);
    if(h.length>0)showPanel(h[0].object.userData.aid);else closePanel();
  });
  
  ren.domElement.addEventListener('mousemove',e=>{
    mpos.x=(e.clientX/window.innerWidth)*2-1;mpos.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mpos,cam);
    const ms=[];meshes.forEach(g=>g.children.forEach(c=>{if(c.userData.aid)ms.push(c)}));
    ren.domElement.style.cursor=ray.intersectObjects(ms).length>0?'pointer':'default';
  });

  document.querySelectorAll('.dept-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.dept-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    const dp=t.dataset.d;
    meshes.forEach(g=>{g.visible=dp==='all'||g.userData.a.dp===dp});
    if(dp!=='all'&&D[dp]){const z=D[dp].z;ctrl.target.lerp(new THREE.Vector3(z.x+z.w/2,0,z.z+z.h/2),.5)}
  }));
}

// ─── DIRECT CHAT DRAWER LOGIC ───
function handleChatKey(e, id) {
  if (e.key === 'Enter') sendChatMessage(id);
}

function sendChatMessage(id) {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const history = document.getElementById('chatHistory');
  if (history.innerHTML.includes('Ask this agent anything...')) history.innerHTML = '';

  // User bubble
  history.innerHTML += `<div style="display:flex; justify-content:flex-end; margin-bottom:4px;"><span style="background:rgba(139,92,246,0.3); color:#fff; border-radius:6px; padding:5px 8px; max-width:80%; word-break:break-word;">${text}</span></div>`;
  input.value = '';
  history.scrollTop = history.scrollHeight;

  const g = meshes.get(id);
  const s = g.userData.st;
  const a = g.userData.a;

  // Agent context response
  setTimeout(() => {
    let r = "Recebi sua mensagem! Como posso auxiliar Stoic AgentOS agora?";
    if (standupManager.active) {
      r = "Desculpe, Benjamin! Estamos no Scrum Standup na mesa de reuniões. Posso falar logo depois? 🎤";
    } else if (s === 'coffee') {
      r = "Estou aproveitando minha pausa no pantry perto do cooler. O que você precisa? ☕";
    } else if (s === 'walking') {
      r = "Estou me deslocando pelo ciberespaço para minha próxima tarefa! 🚶";
    } else if (s === 'typing') {
      r = `Estou ativamente codificando o repositório "${a.pj}". O pipeline de CI/CD está verde! 💻`;
    } else if (s === 'thinking') {
      r = "Estou processando e analisando arquiteturas internas na minha Thread. Um instante...";
    }

    if (text.toLowerCase().includes('olá') || text.toLowerCase().includes('oi')) {
      r = `Olá! Sou o ${a.nm} (${a.rl}). ${r}`;
    }

    history.innerHTML += `<div style="display:flex; justify-content:flex-start; margin-bottom:4px;"><span style="background:rgba(255,255,255,0.06); color:#c4b5fd; border-radius:6px; padding:5px 8px; max-width:80%; word-break:break-word;">${r}</span></div>`;
    history.scrollTop = history.scrollHeight;

    addLog(a.nm, `💬 Chat: "${r.substring(0, 36)}..."`);
  }, 500);
}

function closePanel(){document.getElementById('agentPanel').classList.remove('visible');sel=null}

// ─── ACTIVITY LOG ───
const logs=[];
function addLog(n,a){
  const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logs.unshift({t,n,a});if(logs.length>25)logs.pop();
  document.getElementById('logBody').innerHTML=logs.map(e=>`<div class="log-entry"><span class="time">${e.t}</span><span class="aname">${e.n}</span><span class="act">${e.a}</span></div>`).join('');
}

// ─── UI BINDINGS ───
function ui(){
  document.getElementById('sA').textContent=AG.length;
  document.getElementById('sP').textContent=new Set(AG.map(a=>a.pj)).size;
  const cnt={};AG.forEach(a=>cnt[a.dp]=(cnt[a.dp]||0)+1);
  document.getElementById('cA').textContent=AG.length;
  const ids={dev:'cDev',crea:'cCrea',auto:'cAuto',infra:'cInfra',brain:'cBrain'};
  Object.keys(D).forEach(d=>{const el=document.getElementById(ids[d]);if(el)el.textContent=cnt[d]||0});
  const lg=document.getElementById('legend');
  Object.entries(D).forEach(([k,d])=>{
    const it=document.createElement('div');it.className='leg-item';
    it.innerHTML=`<div class="leg-dot" style="background:${d.h}"></div>${d.i} ${d.n}`;
    it.onclick=()=>{
      document.querySelectorAll('.dept-tab').forEach(t=>t.classList.toggle('active',t.dataset.d===k));
      meshes.forEach(g=>{g.visible=g.userData.a.dp===k});
      const z=d.z;ctrl.target.lerp(new THREE.Vector3(z.x+z.w/2,0,z.z+z.h/2),.5);
    };lg.appendChild(it)});
  setInterval(()=>{
    document.getElementById('sT').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    let ac=0;meshes.forEach(g=>{if(!['coffee','stretching','presenting'].includes(g.userData.st))ac++});
    document.getElementById('sAc').textContent=ac;
  },1000);
  setInterval(()=>{AG.forEach(a=>a.tk.forEach(t=>{t.p=Math.min(100,Math.max(5,t.p+(Math.random()-.3)*3))}));if(sel)showPanel(sel)},5000);
}

function hideLoad(){
  const f=document.getElementById('loadFill');let p=0;
  const iv=setInterval(()=>{p+=Math.random()*18+5;if(p>=100){p=100;clearInterval(iv);
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),300)}f.style.width=p+'%'},100);
}

window.addEventListener('resize',()=>{
  const a=window.innerWidth/window.innerHeight,d=26;
  cam.left=-d*a;cam.right=d*a;cam.top=d;cam.bottom=-d;
  cam.updateProjectionMatrix();ren.setSize(window.innerWidth,window.innerHeight);
});

// ─── MAIN WEBGL FRAME LOOP ───
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clk.getDelta(),.05);T+=dt;
  
  // Continuous Cinematic LERP follow target position
  if (sel) {
    const selectedAgent = meshes.get(sel);
    if (selectedAgent) {
      const focusTarget = new THREE.Vector3(selectedAgent.position.x, 1.35, selectedAgent.position.z);
      ctrl.target.lerp(focusTarget, 0.05);
    }
  }

  ctrl.update();
  
  // Standup Scrum clock timer
  if (!standupManager.active) {
    standupManager.timer -= dt;
    if (standupManager.timer <= 0) {
      triggerStandup();
    }
  } else {
    updateStandup(dt);
  }

  updateAll(dt);
  updateBubbles();

  // Keyboard mechanically generated clicks
  if (audioEnabled && Math.random() < 0.09) {
    let anyTyping = false;
    meshes.forEach(g => {
      if (g.userData.st === 'typing' && g.visible && !standupManager.active) anyTyping = true;
    });
    if (anyTyping) playTypeSound();
  }

  // Floating particles
  parts.forEach(p=>{p.position.y+=p.userData.sp*dt;p.position.x+=Math.sin(T*.8+p.userData.dr)*.004;
    if(p.position.y>5){p.position.y=.3;p.position.x=(Math.random()-.5)*36;p.position.z=(Math.random()-.5)*28+6}
    p.material.opacity=.08+Math.sin(T*1.5+p.userData.dr)*.06});

  // Visual sway micro-animations
  scene.traverse(o=>{
    if(o.userData.leaf)o.position.x+=Math.sin(T*1.2+o.position.z)*.0003;
    if(o.userData.blinkLED){
      o.material.emissiveIntensity=Math.sin(T*8+o.userData.blinkOffset)>0?1.5:0.15;
    }
  });
  ren.render(scene,cam);
}
